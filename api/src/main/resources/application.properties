spring.application.name=api

server.port=8080

# Cấu hình kết nối MySQL cho dự án TrendFit
spring.datasource.url=jdbc:mysql://localhost:3306/TrendFit_DB?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Hibernate tự động sinh bảng từ thực thể Java sang MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
